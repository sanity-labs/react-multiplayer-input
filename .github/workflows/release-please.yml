name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish:
        description: Publish to NPM
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  release-please:
    permissions:
      id-token: write # to enable use of OIDC for npm provenance
      # permissions for pushing commits and opening PRs are handled by the `generate-token` step
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # ratchet:actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.ECOSPARK_APP_ID }}
          private-key: ${{ secrets.ECOSPARK_APP_PRIVATE_KEY }}
      # This action will create a release PR when regular conventional commits are pushed to main, it'll also detect if a release PR is merged and npm publish should happen
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # ratchet:googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}

      # Publish to NPM on new releases
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        if: ${{ steps.release.outputs.release_created || github.event.inputs.publish == 'true' }}
      - uses: pnpm/action-setup@739bfe42ca9233c5e6aca07c1a25a9d34aca49b0 # ratchet:pnpm/action-setup@v6
        if: ${{ steps.release.outputs.release_created || github.event.inputs.publish == 'true' }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6
        if: ${{ steps.release.outputs.release_created || github.event.inputs.publish == 'true' }}
        with:
          cache: pnpm
          node-version: lts/*
          registry-url: "https://registry.npmjs.org"
      # npm 11.5.1+ required for OIDC trusted publishing
      - name: Update npm for trusted publishing (OIDC)
        if: ${{ steps.release.outputs.release_created || github.event.inputs.publish == 'true' }}
        run: npm install -g npm@latest
      - run: pnpm install --ignore-scripts
        if: ${{ steps.release.outputs.release_created || github.event.inputs.publish == 'true' }}
      # Release Please has already incremented versions and published tags, so we just
      # need to publish the new version to npm here. Auth is via OIDC trusted
      # publishing — no NPM token needed.
      - run: pnpm publish
        if: ${{ steps.release.outputs.release_created || github.event.inputs.publish == 'true' }}
        env:
          NPM_CONFIG_PROVENANCE: true
